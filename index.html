<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Pizza Buna Admin</title>
<style>
:root{--red:#c62828;--dark:#24140f;--muted:#6b4f43;--border:#f1d3bd;--green:#15803d;--bg:#fff7ed;--card:#fff;--gold:#f59e0b;font-family:Inter,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif}
*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--dark)}.admin{max-width:720px;margin:0 auto;padding:18px}.panel{background:#fff;border:1px solid var(--border);border-radius:24px;box-shadow:0 16px 40px rgba(74,32,20,.12);overflow:hidden}.head{padding:22px;background:#fffaf5;border-bottom:1px solid var(--border)}h1{margin:0;font-size:30px}.head p{margin:6px 0 0;color:var(--muted)}.content{padding:22px;display:grid;gap:18px}.section{border:1px solid var(--border);border-radius:18px;padding:16px;background:#fff}.section h2{margin:0 0 12px;font-size:18px}.row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}.row.one{grid-template-columns:1fr}.field label{display:block;font-weight:800;margin-bottom:6px}.field select,.field input{width:100%;min-height:46px;border:1px solid var(--border);border-radius:12px;padding:8px 10px;font:inherit;background:#fff}.toggle-row{display:flex;align-items:center;justify-content:space-between;gap:12px}.switch{position:relative;width:54px;height:30px}.switch input{opacity:0;width:0;height:0}.slider{position:absolute;inset:0;background:#ccc;border-radius:999px;cursor:pointer}.slider:after{content:'';position:absolute;width:24px;height:24px;left:3px;top:3px;background:#fff;border-radius:50%;transition:.2s}.switch input:checked+.slider{background:var(--green)}.switch input:checked+.slider:after{transform:translateX(24px)}button{border:0;background:var(--red);color:#fff;min-height:54px;border-radius:999px;padding:0 24px;font-weight:900;font-size:17px;cursor:pointer;width:100%;box-shadow:0 10px 22px rgba(198,40,40,.22)}button:disabled{opacity:.55;cursor:not-allowed}.msg{display:none;border-radius:14px;padding:13px 14px;font-weight:800}.msg.show{display:block}.ok{background:#f0fdf4;color:#166534}.err{background:#fef2f2;color:#991b1b}.load{background:#fffbeb;color:#92400e;display:block}@media(max-width:640px){.row{grid-template-columns:1fr}.admin{padding:10px}.content{padding:14px}}
</style>
</head>
<body>
<div class="admin"><div class="panel"><div class="head"><h1>Pizza Buna Admin</h1><p>Controlează comenzile online și programul restaurantului.</p></div><div class="content">
<div class="msg load" id="msg">Se încarcă setările...</div>
<div class="section"><h2>Comenzi online</h2><div class="toggle-row"><strong>Acceptă comenzi online</strong><label class="switch"><input type="checkbox" id="masterEnabled"><span class="slider"></span></label></div></div>
<div class="section"><h2>Program comenzi</h2><div class="row"><div class="field"><label>Deschidere</label><select id="morningOpen"></select></div><div class="field"><label>Închidere</label><select id="morningClose"></select></div></div><div class="toggle-row" style="margin:8px 0 14px"><strong>Are pauză la prânz</strong><label class="switch"><input type="checkbox" id="hasBreak"><span class="slider"></span></label></div><div id="breakWrap" class="row"><div class="field"><label>Început pauză</label><select id="breakStart"></select></div><div class="field"><label>Sfârșit pauză</label><select id="breakEnd"></select></div></div><div class="row"><div class="field"><label>Deschidere seara</label><select id="eveningOpen"></select></div><div class="field"><label>Închidere seara</label><select id="eveningClose"></select></div></div></div>
<div class="section"><h2>PIN intern</h2><div class="row one"><div class="field"><label>PIN administrare</label><input id="pin" type="password" maxlength="4" inputmode="numeric" placeholder="1234"></div></div></div>
<button id="saveBtn" type="button">Salvează setările</button>
</div></div></div>
<script>
var API_URL='https://script.google.com/macros/s/AKfycbwHJXTSJqcpzlNFOFqEjwVVfPWM0CnIJikzZdJj3_VdR8axo3Pts9sy7tDqXpVhd52u/exec';
var ids=['morningOpen','morningClose','breakStart','breakEnd','eveningOpen','eveningClose'];
function $(id){return document.getElementById(id)}
function parseTime(v){if(!v)return '12:00';v=String(v);var iso=v.match(/T(\d{2}):(\d{2})/);if(iso)return iso[1]+':'+iso[2];var normal=v.match(/^(\d{1,2}):(\d{2})/);if(normal)return String(normal[1]).padStart(2,'0')+':'+normal[2];var dateText=v.match(/\b(\d{2}):(\d{2}):(\d{2})\b/);if(dateText)return dateText[1]+':'+dateText[2];return '12:00'}
function timeOptions(sel,val){sel.innerHTML='';for(var h=0;h<24;h++){for(var m=0;m<60;m+=15){var v=String(h).padStart(2,'0')+':'+String(m).padStart(2,'0');var lab=v;var o=document.createElement('option');o.value=v;o.textContent=lab;if(v===val)o.selected=true;sel.appendChild(o)}}}
function msg(txt,type){var el=$('msg');el.className='msg show '+(type||'load');el.innerHTML=txt}
function setBreakVisible(){ $('breakWrap').style.display=$('hasBreak').checked?'grid':'none'}
function loadViaJsonp(onOk,onErr){var cb='pb_admin_jsonp_'+Date.now()+'_'+Math.floor(Math.random()*100000);window[cb]=function(data){try{onOk(data)}finally{delete window[cb];if(script.parentNode)script.parentNode.removeChild(script)}};var script=document.createElement('script');script.src=API_URL+'?callback='+cb+'&cb='+Date.now();script.onerror=function(){delete window[cb];if(onErr)onErr()};document.body.appendChild(script)}
function load(){msg('Se încarcă setările...','load');loadViaJsonp(function(data){var s=data.settings||{};$('masterEnabled').checked=s.masterEnabled===true||s.masterEnabled==='TRUE';$('hasBreak').checked=s.hasBreak===true||s.hasBreak==='TRUE';ids.forEach(function(id){timeOptions($(id),parseTime(s[id]))});$('pin').value=s.pin||'1234';setBreakVisible();msg('✅ Setările au fost încărcate.','ok')},function(){msg('❌ Nu pot încărca setările. Verifică deployment-ul Apps Script.','err')})}
function save(){var pin=$('pin').value.trim();if(!/^\d{4}$/.test(pin)){msg('❌ PIN-ul trebuie să aibă 4 cifre.','err');return}var payload={action:'saveSettings',settings:{masterEnabled:$('masterEnabled').checked,hasBreak:$('hasBreak').checked,pin:pin}};ids.forEach(function(id){payload.settings[id]=$(id).value});$('saveBtn').disabled=true;msg('Se salvează...','load');var form=document.createElement('form');form.method='POST';form.action=API_URL;form.target='hiddenSubmit';form.style.display='none';var input=document.createElement('input');input.name='payload';input.value=JSON.stringify(payload);form.appendChild(input);var iframe=document.createElement('iframe');iframe.name='hiddenSubmit';iframe.style.display='none';document.body.appendChild(iframe);document.body.appendChild(form);form.submit();setTimeout(function(){$('saveBtn').disabled=false;msg('✅ Setările au fost trimise. Reîncarcă pagina publică pentru verificare.','ok');form.remove();iframe.remove();},1800)}
$('hasBreak').addEventListener('change',setBreakVisible);$('saveBtn').addEventListener('click',save);load();
</script>
</body>
</html>
